name: Deploy book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Let the workflow publish Pages artifacts and authenticate with the
# OIDC token that `actions/deploy-pages` expects.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel in-progress runs if a newer push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.40'

      - name: Build
        run: mdbook build book

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book/book

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
